<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Terminal Code</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #3498db; }
        .code { font-size: 26px; color: #3498db; margin: 20px; padding: 15px; border: 1px dashed #3498db; word-break: break-all; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>АВТОРИЗАЦИЯ УСПЕШНА ✅</h2>
        <p>Нажмите на код, чтобы скопировать:</p>
        <div id="c" class="code" onclick="copy()">Загрузка...</div>
        <button onclick="copy()">КОПИРОВАТЬ КОД</button>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        const code = p.get('code');
        const el = document.getElementById('c');
        el.innerText = code ? code : "Код не найден";
        function copy() {
            navigator.clipboard.writeText(el.innerText);
            alert("Скопировано!");
        }
    </script>
</body>
</html>
