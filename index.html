<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация Terminal DerivKN</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .code { font-size: 24px; font-weight: bold; color: #3498db; background: #eef2f7; padding: 15px; border-radius: 6px; margin: 20px 0; word-break: break-all; border: 1px dashed #3498db; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Авторизация успешна!</h2>
        <p>Скопируйте этот код и вставьте в поле терминала:</p>
        <div id="auth-code" class="code">Загрузка...</div>
        <button onclick="copyCode()">Копировать код</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const codeElement = document.getElementById('auth-code');

        if (code) {
            codeElement.innerText = code;
        } else {
            codeElement.innerText = "Код не найден в URL";
            codeElement.style.color = "red";
        }

        function copyCode() {
            navigator.clipboard.writeText(codeElement.innerText);
            alert("Код скопирован!");
        }
    </script>
</body>
</html>
