<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация Terminal DerivKN</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #e74c3c; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="content">
        <h2>Синхронизация с терминалом...</h2>
        <div class="loader"></div>
        <p>Пожалуйста, не закрывайте эту страницу.</p>
    </div>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                const copyText = "DERIV_CODE:" + code;
                const el = document.createElement('textarea');
                el.value = copyText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                document.getElementById('content').innerHTML = "<h2 style='color:#2ecc71'>✓ УСПЕШНО</h2><p>Вернитесь в терминал.</p>";
            } else {
                document.getElementById('content').innerHTML = "<h2>Ожидание данных...</h2>";
            }
        }
    </script>
</body>
</html>
