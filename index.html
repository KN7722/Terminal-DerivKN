<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Код Авторизации</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .box { background: #2a2a2a; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #3498db; }
        .code { font-size: 28px; color: #3498db; margin: 20px; padding: 10px; border: 1px dashed #3498db; word-break: break-all; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>АВТОРИЗАЦИЯ УСПЕШНА ✅</h2>
        <p>Скопируйте этот код в терминал:</p>
        <div id="c" class="code">Загрузка...</div>
        <button onclick="navigator.clipboard.writeText(document.getElementById('c').innerText);alert('Скопировано!')">КОПИРОВАТЬ</button>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        const code = p.get('code');
        document.getElementById('c').innerText = code ? code : "Код не найден";
    </script>
</body>
</html>
